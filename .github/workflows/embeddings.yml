name: Wiki — Build, BM25 Index & Publish

on:
  push:
    paths:
      - 'docs/wiki/**'
      - 'docs/worker/**'
      - 'docs/hooks/**'
      - 'mkdocs.yml'
      - '.github/workflows/embeddings.yml'
      - '.github/workflows/requirements.txt'
  workflow_dispatch:
    inputs:
      refresh:
        description: 'Refresh all social cards (ignore cache)'
        required: false
        default: false
        type: boolean

concurrency:
  group: wiki-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # libcairo2, libpango, curl are pre-installed on ubuntu-latest — no apt-get needed.
      # The social plugin downloads fonts via Google Fonts API and caches them in .cache/.

      - name: Restore social plugin cache (fonts + card manifest)
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-social-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-social-v2-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore wheelhouse
        uses: actions/cache@v4
        with:
          path: ./.wheels
          key: ${{ runner.os }}-wheels-${{ hashFiles('.github/workflows/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-wheels-

      - name: Build wheels and install
        run: |
          python -m pip install --upgrade pip
          mkdir -p ./.wheels
          pip wheel --wheel-dir ./.wheels -r .github/workflows/requirements.txt || true
          pip wheel --wheel-dir ./.wheels mkdocs mkdocs-material mkdocs-minify-plugin mkdocs-open-in-new-tab || true
          pip install --find-links ./.wheels -r .github/workflows/requirements.txt
          pip install --find-links ./.wheels mkdocs mkdocs-material mkdocs-minify-plugin mkdocs-open-in-new-tab

      - name: Clear social card cache (if refresh requested)
        if: ${{ inputs.refresh == true }}
        run: |
          rm -f .cache/hooks/social_cards/manifest.json
          echo "Social card cache cleared — all cards will be regenerated"

      - name: Build MkDocs site
        run: mkdocs build

      - name: Build BM25 index
        run: |
          python docs/worker/build_bm25_index.py \
            --docs-dir docs/wiki \
            --output site/wiki_index.json \
            --grimoire-output site/assets/data/grimoire-data.json \
            --leaderboard-output site/assets/data/leaderboard-data.json \
            --socials-output site/assets/data/credits.json \
            --tags-output site/assets/data/tags.json \
            --glossary-output site/assets/data/glossary.json \
            --graph-output site/assets/data/graph.json \
            --exclude "_wip/*" \
            --gzip
          echo "${{ hashFiles('docs/wiki/**') }}" > site/wiki_index.hash

      - name: Verify index and size-check
        run: |
          if [ -f site/wiki_index.json.gz ]; then
            s=$(wc -c < site/wiki_index.json.gz)
            echo "gz size $s"
            if [ "$s" -gt $((500*1024*1024)) ]; then
              echo "INDEX TOO LARGE $s"
              exit 1
            fi
          else
            echo 'no index produced'
            exit 1
          fi

      - name: Commit and push updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet docs/assets/data/credits.json docs/assets/data/tags.json docs/assets/data/glossary.json docs/assets/data/graph.json; then
            echo "No changes to data files"
          else
            echo "Found new contributors, tags, or glitches, committing..."
            git add docs/assets/data/credits.json docs/assets/data/tags.json docs/assets/data/glossary.json docs/assets/data/graph.json || true
            git commit -m "chore: auto-aggregate discovered contributors, tags, glitches, and graph" || echo "Nothing to commit"
            git push origin main || echo "Push failed"
          fi

      - name: Publish site
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site


