name: Wiki — Build, BM25 Index & Publish

on:
  push:
    paths:
      - 'docs/wiki/**'
      - 'docs/worker/**'
      - 'docs/hooks/**'
      - 'mkdocs.yml'
      - '.github/workflows/embeddings.yml'
      - '.github/workflows/requirements.txt'
  workflow_dispatch:
    inputs:
      refresh:
        description: 'Refresh all social cards (ignore cache)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # libcairo2, libpango, curl are pre-installed on ubuntu-latest — no apt-get needed.
      # The social plugin downloads fonts via Google Fonts API and caches them in .cache/.

      - name: Restore social plugin cache (fonts + card manifest)
        uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-social-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-social-v2-

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('.github/workflows/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore wheelhouse
        uses: actions/cache@v4
        with:
          path: ./.wheels
          key: ${{ runner.os }}-wheels-${{ hashFiles('.github/workflows/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-wheels-

      - name: Build wheels and install
        run: |
          python -m pip install --upgrade pip
          mkdir -p ./.wheels
          pip wheel --wheel-dir ./.wheels -r .github/workflows/requirements.txt || true
          pip install --find-links ./.wheels -r .github/workflows/requirements.txt

      - name: Clear social card cache (if refresh requested)
        if: ${{ inputs.refresh == true }}
        run: |
          rm -f .cache/hooks/social_cards/manifest.json
          echo "Social card cache cleared — all cards will be regenerated"

      - name: Generate UIDs for new glitchcraft pages
        run: python docs/worker/build_bm25_index.py --uid-only

      - name: Build MkDocs site
        run: mkdocs build

      - name: Build BM25 index
        run: |
          python docs/worker/build_bm25_index.py \
            --docs-dir docs/wiki \
            --output site/wiki_index.json \
            --grimoire-output site/assets/data/grimoire-data.json \
            --leaderboard-output site/assets/data/leaderboard-data.json \
            --socials-output site/assets/data/credits.json \
            --tags-output site/assets/data/tags.json \
            --glossary-output site/assets/data/glossary.json \
            --graph-output site/assets/data/graph.json \
            --exclude "_wip/*" \
            --gzip
          echo "${{ hashFiles('docs/wiki/**') }}" > site/wiki_index.hash

      - name: Verify index and size-check
        run: |
          if [ -f site/wiki_index.json.gz ]; then
            s=$(wc -c < site/wiki_index.json.gz)
            echo "gz size $s"
            if [ "$s" -gt $((500*1024*1024)) ]; then
              echo "INDEX TOO LARGE $s"
              exit 1
            fi
          else
            echo 'no index produced'
            exit 1
          fi

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/wiki/glitchcraft/*.md docs/assets/data/credits.json docs/assets/data/tags.json docs/assets/data/glossary.json docs/assets/data/graph.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            echo "Found new UIDs, contributors, tags, or glitches, committing..."
            git commit -m "chore: auto-generate UIDs and aggregate data" || echo "Nothing to commit"
            git push origin main || echo "Push failed"
          fi

      - name: Publish site (gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-wrangler-4

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Upload social cards to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          # Skip if Cloudflare secrets not configured yet
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Cloudflare secrets not set — skipping social card upload"
            exit 0
          fi

          SOCIAL_DIR="site/assets/images/social"
          if [ ! -d "$SOCIAL_DIR" ]; then
            echo "No social cards directory found — skipping"
            exit 0
          fi

          # Track which cards have been uploaded via a hash manifest in .cache
          UPLOAD_MANIFEST=".cache/hooks/social_cards/r2-uploads.json"
          mkdir -p "$(dirname "$UPLOAD_MANIFEST")"
          if [ ! -f "$UPLOAD_MANIFEST" ]; then
            echo '{}' > "$UPLOAD_MANIFEST"
          fi

          uploaded=0
          skipped=0

          find "$SOCIAL_DIR" -type f -name '*.png' | while read -r file; do
            key="social/${file#$SOCIAL_DIR/}"
            # Compute content hash
            hash=$(sha256sum "$file" | cut -d' ' -f1)
            # Check if already uploaded with same hash
            prev=$(python3 -c "import json,sys; d=json.load(open('$UPLOAD_MANIFEST')); print(d.get('$key',''))" 2>/dev/null || echo "")
            if [ "$hash" = "$prev" ]; then
              skipped=$((skipped + 1))
              continue
            fi
            echo "Uploading $key"
            wrangler r2 object put "ultrabroken-media/$key" --file="$file" --content-type="image/png" --remote
            # Update manifest entry
            python3 -c "
          import json
          m = json.load(open('$UPLOAD_MANIFEST'))
          m['$key'] = '$hash'
          json.dump(m, open('$UPLOAD_MANIFEST', 'w'), indent=2)
          "
            uploaded=$((uploaded + 1))
          done

          echo "Upload complete: $uploaded new/changed, $skipped unchanged (skipped)"

          # ── Cleanup orphaned social cards from R2 ──
          # Cards for deleted/renamed pages are no longer generated by the build.
          # Compare r2-uploads.json against actual build output and delete orphans.
          python3 << 'CLEANUP_EOF'
          import json, os, subprocess, sys

          social_dir = "site/assets/images/social"
          manifest_path = ".cache/hooks/social_cards/r2-uploads.json"

          # Build set of expected R2 keys from current build output
          expected = set()
          for root, dirs, files in os.walk(social_dir):
              for f in files:
                  if f.endswith(".png"):
                      rel = os.path.relpath(os.path.join(root, f), social_dir)
                      expected.add("social/" + rel.replace("\\", "/"))

          manifest = json.load(open(manifest_path))
          orphaned = [k for k in manifest if k not in expected]

          if not orphaned:
              print("No orphaned social cards to clean up")
              sys.exit(0)

          print(f"Removing {len(orphaned)} orphaned social card(s) from R2")
          for key in orphaned:
              print(f"  Deleting: {key}")
              subprocess.run(
                  ["wrangler", "r2", "object", "delete",
                   f"ultrabroken-media/{key}", "--remote"],
                  check=False,
              )
              del manifest[key]

          json.dump(manifest, open(manifest_path, "w"), indent=2)
          print(f"Cleanup complete")
          CLEANUP_EOF