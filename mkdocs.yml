site_name: Ultrabroken Archives
# ci: trigger workflows
site_description: Community-driven encyclopedia documenting glitches, techniques and investigations for the videogame The Legend of Zelda Tears of the Kingdom
site_author: NaN Gogh & Community
copyright: Community-Driven Research
site_url: https://nan-gogh.github.io/ultrabroken-documentation/
use_directory_urls: true

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/graphics/ultrabroken_rune.svg
  favicon: assets/images/icons/ultrabroken_rune.ico
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - search.highlight
    - search.share
    - search.suggest
  palette:
    scheme: slate
    primary: teal
    accent: teal

extra_css:
  - assets/stylesheets/glow.css

extra_javascript:
  - assets/scripts/mermaid-config.js
  - assets/vendor/marked.min.js
  - assets/vendor/purify.min.js
  - assets/scripts/tab-scroll-fix.js  # Prevents overshoot when scrolling tabs near boundaries
  - assets/scripts/clipboard-permalink.js
  - assets/scripts/search-highlights-cleanup.js
  - assets/scripts/search-enter-navigate.js  # Fixes focus state bug + navigates to first result on Enter
  - assets/scripts/header-reserve.js
  - assets/scripts/header-marquee.js
  - assets/scripts/storage-manager.js
  - assets/scripts/storage-toggle.js
  - assets/scripts/font-size-toggle.js
  - assets/scripts/motion-toggle.js
  - assets/scripts/tasklist-enhance.js  # Makes entire task-list item clickable
  - assets/scripts/back-to-top.js  # Custom back-to-top with icon, no text
  - assets/scripts/background-rune.js  # Display animated background rune watermark
  - assets/scripts/search-link.js
  - assets/scripts/ai-worker-client.js
  - assets/scripts/grimoire-filter.js
  - assets/scripts/leaderboard.js
  - assets/scripts/graph-view.js
  - assets/scripts/cosmetic-urls.js
  - assets/scripts/mobile-toc.js

