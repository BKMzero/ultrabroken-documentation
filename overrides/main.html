{% extends "base.html" %}

{% block extrahead %}
  <!-- On fresh navigation, strip the URL fragment early so the
       browser never does native scroll-to-anchor before JS can
       activate tabs / collapsed sections.  On page reload, also
       strip the hash (to prevent anchor-jump) but let the browser
       restore the user's scroll position naturally via history. -->
  <script>(function(){var n=performance.getEntriesByType&&performance.getEntriesByType('navigation')[0];var isReload=n?n.type==='reload':performance.navigation&&performance.navigation.type===1;if(isReload){if(location.hash){window.__ubReloadHash=location.hash;history.replaceState(null,'',location.pathname+location.search)}window.__ubIsReload=true;return}if(location.hash){window.__ubSavedHash=location.hash;history.replaceState(null,'',location.pathname+location.search)}})()</script>
  <!-- Preload critical Latin font files (same-origin, no DNS hops) -->
  <link rel="preload" href="{{ 'assets/fonts/texturina-latin.woff2' | url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ 'assets/fonts/new-rocker-400-latin.woff2' | url }}" as="font" type="font/woff2" crossorigin>
  <!-- Critical above-fold CSS: gear button + title styles available before glow.css loads. -->
  <style>
    .ub-header-toggles{display:flex;align-items:center;gap:0;position:absolute;left:50%;transform:translateX(-50%);z-index:2}
    .ub-settings-gear{display:inline-flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;padding:4px;color:#00f0c2;vertical-align:middle;line-height:1}
    .ub-settings-gear svg{width:20px;height:20px;display:block}
    .md-header__title .md-ellipsis{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:var(--header-available-width,100%)}
    @media(max-width:76.25em){.ub-header-toggles{display:none!important}}
  </style>
{% endblock %}

{% block header %}
  {{ super() }}
  {# Synchronous: inject a single gear button visible on first paint.
     settings-modal.js will adopt it and attach the click handler. #}
  <script>
  (function(){
    var s=document.querySelector('label[for="__search"]');
    if(!s||window.innerWidth<1220)return;
    var c=document.createElement('div');
    c.className='ub-header-toggles';
    c.innerHTML=
      '<button class="ub-settings-gear" aria-label="Open settings">'
      +'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">'
      +'<path fill="currentColor" d="M19.14 12.94a7.07 7.07 0 0 0 .06-.94 7.07 7.07 0 0 0-.06-.94l2.03-1.58'
      +'a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.04 7.04 0 0 0-1.62-.94'
      +'l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54a7.04 7.04 0 0 0-1.62.94'
      +'l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58a7.07 7.07 0 0 0-.06.94'
      +' 7.07 7.07 0 0 0 .06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32a.49.49 0 0 0 .59.22l2.39-.96'
      +'a7.04 7.04 0 0 0 1.62.94l.36 2.54a.48.48 0 0 0 .48.41h3.84a.48.48 0 0 0 .48-.41l.36-2.54'
      +'a7.04 7.04 0 0 0 1.62-.94l2.39.96a.49.49 0 0 0 .59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58z'
      +'M12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>'
      +'</svg>'
      +'</button>';
    s.parentNode.insertBefore(c,s.nextSibling);
  })();
  </script>
{% endblock %}
