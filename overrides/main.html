{% extends "base.html" %}

{% block extrahead %}
  <!-- Preload critical Latin font files (same-origin, no DNS hops) -->
  <link rel="preload" href="{{ 'assets/fonts/texturina-latin.woff2' | url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ 'assets/fonts/new-rocker-400-latin.woff2' | url }}" as="font" type="font/woff2" crossorigin>
  <!-- Generous initial title width — prevents 1-frame truncation before header-reserve.js measures -->
  <style>:root{--header-available-width:100vw}</style>
{% endblock %}

{% block header %}
  {{ super() }}
  {# Synchronous: runs right after header parses, buttons visible on first paint.
     Each toggle script will adopt the pre-existing button and attach listeners. #}
  <script>
  (function(){
    var s=document.querySelector('label[for="__search"]');
    if(!s||window.innerWidth<1220)return;
    var c=document.createElement('div');
    c.className='ub-header-toggles';
    c.innerHTML=
      '<button class="ub-motion-toggle" aria-label="Toggle background mode">'
      +'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><rect fill="currentColor" x="6" y="4" width="4" height="16" rx="1"/><rect fill="currentColor" x="14" y="4" width="4" height="16" rx="1"/></svg>'
      +'</button>'
      +'<button class="ub-storage-toggle" aria-label="Toggle local storage">'
      +'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><ellipse cx="12" cy="6" rx="8" ry="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 6v4c0 1.66 3.58 3 8 3s8-1.34 8-3V6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 10v4c0 1.66 3.58 3 8 3s8-1.34 8-3v-4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 14v4c0 1.66 3.58 3 8 3s8-1.34 8-3v-4" fill="none" stroke="currentColor" stroke-width="2"/></svg>'
      +'</button>'
      +'<button class="ub-font-toggle" aria-label="Toggle font size">'
      +'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><text x="10" y="18" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="currentColor" text-anchor="middle">A</text><text x="19" y="10" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="currentColor" text-anchor="middle">+</text></svg>'
      +'</button>';
    s.parentNode.insertBefore(c,s.nextSibling);
  })();
  </script>
{% endblock %}
